services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB:       studyai
      POSTGRES_USER:     studyai
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U studyai"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Qdrant ──────────────────────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    restart: always
    environment:
      QDRANT__SERVICE__API_KEY: ${QDRANT_API_KEY}
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:6333/healthz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── Python PPTX/DOCX processor ──────────────────────────────────────────────
  processor:
    build: ./processor
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8001/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Next.js web app ─────────────────────────────────────────────────────────
  web:
    build:
      context: ..
      dockerfile: vps/Dockerfile.web
    restart: always
    env_file: .env.web
    environment:
      DATABASE_URL:   postgresql://studyai:${POSTGRES_PASSWORD}@postgres:5432/studyai
      QDRANT_URL:     http://qdrant:6333
      QDRANT_API_KEY: ${QDRANT_API_KEY}
      PROCESSOR_URL:  http://processor:8001
      NODE_ENV:       production
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Nginx reverse proxy + SSL ───────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_conf:/etc/letsencrypt:ro
    depends_on:
      - web

  # ── Certbot (SSL certificates) ──────────────────────────────────────────────
  certbot:
    image: certbot/certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done"

volumes:
  postgres_data:
  qdrant_data:
  certbot_www:
  certbot_conf:
