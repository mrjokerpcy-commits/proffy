events { worker_connections 1024; }

http {
  # ── Processor API (internal only, called by Next.js) ──────────────────────
  server {
    listen 80;
    server_name _;

    location /health {
      return 200 "ok";
    }

    location /processor/ {
      proxy_pass         http://processor:8001/;
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_read_timeout 120s;
    }
  }
}
